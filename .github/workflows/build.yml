name: build

# 一套代码同时出 Windows .exe 和 macOS .dmg。
# 触发：推一个 v 开头的 tag（如 v0.1.0），或在 Actions 页面手动 Run。
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --win nsis portable
          - os: macos-latest
            args: --mac dmg zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Generate icons
        run: npm run icons

      - name: Build installer
        run: npx electron-builder ${{ matrix.args }} --publish never
        env:
          # 没有代码签名证书时跳过签名（产出未签名安装包，内部用足够）
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: offwork-radar-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip

      # 打了 v 开头的 tag 时，把 exe / dmg 直接发布到 Release 页面，方便同事在网页上点下载
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
